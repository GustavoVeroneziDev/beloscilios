name: Deploy para Hospedagem

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Acionar deploy na hospedagem via webhook
        run: |
          RESPONSE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
            "${{ secrets.SITE_URL }}/deploy/webhook.php")

          BODY=$(cat /tmp/deploy_response.txt)
          echo "Resposta: $BODY"
          echo "HTTP: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Deploy falhou com HTTP $RESPONSE"
            exit 1
          fi
          echo "✅ Deploy concluído!"

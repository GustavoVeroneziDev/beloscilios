name: Deploy para Hospedagem

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar config/versao.php com hash do commit
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u '+%d/%m/%Y %H:%M UTC')
          printf '<?php\ndefine("APP_VERSAO", "%s");\ndefine("APP_BUILD_DATE", "%s");\n' "$SHORT_SHA" "$BUILD_DATE" > config/versao.php

      - name: Deploy via FTP para hospedagem
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:     ${{ secrets.FTP_HOST }}
          username:   ${{ secrets.FTP_USER }}
          password:   ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/config/conexao.php
            **/config/gemini.php
            **/config/evolution_keys.php
            **/config/smtp_keys.php
            **/config/google_oauth.php
            **/uploads/**
            **/logs/**
